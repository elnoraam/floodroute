version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: floodroute
      POSTGRES_PASSWORD: floodpassword
      POSTGRES_DB: floodroute
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: floodroute
      DB_PASSWORD: floodpassword
      DB_NAME: floodroute
      JWT_SECRET: your_jwt_secret
      ORS_API_KEY: your_ors_api_key
      OPENWEATHER_API_KEY: your_openweather_api_key
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
